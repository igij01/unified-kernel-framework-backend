# ─── Named volumes ─────────────────────────────────────────────────────────────
# All caches are named volumes (not bind mounts) to avoid WSL2 filesystem
# permission issues and to share them across container restarts.

volumes:
  conda-pkgs-cache:   # Conda package download cache (shared across all slots)
  pip-cache:          # pip download cache (shared across all slots)
  hf-cache:           # HuggingFace model/dataset cache (shared across all slots)
  triton-cache:       # Compiled Triton kernels (shared across torch slots)
  ccache-cuda118:     # ccache for CUDA 11.8 toolchain
  ccache-cuda121:     # ccache for CUDA 12.1 toolchain
  ccache-cuda124:     # ccache for CUDA 12.4 toolchain (torch + tf slots)
  ccache-cuda126:     # ccache for CUDA 12.6 toolchain
  ccache-cuda130:     # ccache for CUDA 13.0 toolchain
