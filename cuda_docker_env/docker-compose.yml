# =============================================================================
# cuda-playground — Docker Compose service definitions
#
# All paths are relative to this file's directory (cuda_docker_env/).
#   context: ..   → repository root
#   source:  ..   → repository root (bind mount)
#
# Quick reference
# ───────────────
# Build:   docker compose -f cuda_docker_env/docker-compose.yml build dev-<slot>
# Shell:   docker compose -f cuda_docker_env/docker-compose.yml --profile <slot> \
#              run --rm -it dev-<slot>
# Jupyter: docker compose -f cuda_docker_env/docker-compose.yml --profile <slot>-jupyter \
#              up jupyter-<slot>
#
# Or use the convenience scripts:
#   ./cuda_docker_env/scripts/build-env.sh  <slot>
#   ./cuda_docker_env/scripts/shell.sh      [slot]
#   ./cuda_docker_env/scripts/jupyter.sh    [slot]
#   ./cuda_docker_env/scripts/run-cmake.sh  [slot] [preset]
#
# Available slots
# ───────────────
#   cuda118-torch   CUDA 11.8 + PyTorch 2.1.0   [legacy]
#   cuda121-torch   CUDA 12.1 + PyTorch 2.2.1   [stable]
#   cuda124-torch   CUDA 12.4 + PyTorch 2.6.0   [recommended]
#   cuda124-tf      CUDA 12.4 + TensorFlow 2.15
#   cuda126-torch   CUDA 12.6 + PyTorch 2.6.0   [bleeding edge]
#
# Jupyter ports (override in cuda_docker_env/.env)
# ───────────────
#   cuda118-torch → localhost:8818
#   cuda121-torch → localhost:8821
#   cuda124-torch → localhost:8824
#   cuda124-tf    → localhost:8825
#   cuda126-torch → localhost:8826
# =============================================================================

name: cuda-playground

# ─── Shared anchors ───────────────────────────────────────────────────────────

x-gpu-access: &gpu-access
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

x-base-env: &base-env
  NVIDIA_VISIBLE_DEVICES: all
  NVIDIA_DRIVER_CAPABILITIES: compute,utility
  CUDA_CACHE_PATH: /root/.cache/cuda_cache

x-common: &common
  <<: *gpu-access
  working_dir: /workspace
  stdin_open: true
  tty: true

# ─── Services ─────────────────────────────────────────────────────────────────

services:

  # ── CUDA 11.8 + PyTorch 2.1.0  [legacy] ─────────────────────────────────────

  dev-cuda118-torch:
    <<: *common
    profiles: [cuda118-torch, cuda118, legacy]
    build:
      context: ..
      dockerfile: cuda_docker_env/Dockerfile
      target: dev
      args:
        CUDA_IMAGE: nvidia/cuda:11.8.0-devel-ubuntu22.04
        CONDA_ENV_FILE: cuda118-torch210.yaml
    image: cuda-playground/dev:cuda118-torch
    hostname: dev-cuda118-torch
    environment:
      <<: *base-env
    volumes:
      - type: bind
        source: ..
        target: /workspace
      - conda-pkgs-cache:/opt/conda/pkgs
      - pip-cache:/root/.cache/pip
      - hf-cache:/root/.cache/huggingface
      - triton-cache:/root/.cache/triton
      - ccache-cuda118:/root/.cache/ccache

  jupyter-cuda118-torch:
    <<: *common
    profiles: [cuda118-torch-jupyter, jupyter-legacy]
    build:
      context: ..
      dockerfile: cuda_docker_env/Dockerfile
      target: dev
      args:
        CUDA_IMAGE: nvidia/cuda:11.8.0-devel-ubuntu22.04
        CONDA_ENV_FILE: cuda118-torch210.yaml
    image: cuda-playground/dev:cuda118-torch
    hostname: jupyter-cuda118-torch
    environment:
      <<: *base-env
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-playground}
    volumes:
      - type: bind
        source: ..
        target: /workspace
      - conda-pkgs-cache:/opt/conda/pkgs
      - pip-cache:/root/.cache/pip
      - hf-cache:/root/.cache/huggingface
      - triton-cache:/root/.cache/triton
      - ccache-cuda118:/root/.cache/ccache
    ports:
      - "${JUPYTER_PORT_CUDA118:-8818}:8888"
    command: ["jupyter", "lab", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root"]

  # ── CUDA 12.1 + PyTorch 2.2.1  [stable] ─────────────────────────────────────

  dev-cuda121-torch:
