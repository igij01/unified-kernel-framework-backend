# Slot: cuda118-torch  [legacy]
# CUDA 11.8 + PyTorch 2.1.0
#
# Triton 2.1.0 is installed automatically as a pip dependency of torch.
# Verify wheel availability: https://download.pytorch.org/whl/cu118/

name: playground

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # ── Scientific stack (conda for fast solver resolution) ──────────────────
  - jupyterlab=4.2.*
  - ipywidgets=8.*
  - numpy=1.26.*
  - matplotlib=3.9.*
  - pandas=2.2.*
  - scipy=1.13.*

  # ── GPU framework (pip for exact CUDA-variant wheels) ────────────────────
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu118
    - torch==2.1.0+cu118
    - torchvision==0.16.0+cu118
    - torchaudio==2.1.0+cu118
