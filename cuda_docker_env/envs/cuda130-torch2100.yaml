# Slot: cuda130-torch
# CUDA 13.0 + PyTorch 2.10.0
#
# Triton 3.2.0 is installed automatically as a pip dependency of torch.
# Verify wheel availability: https://download.pytorch.org/whl/cu130/

name: playground

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.13
  - pip

  # ── Scientific stack ─────────────────────────────────────────────────────
  - jupyterlab=4.5.*
  - ipywidgets=8.*
  - numpy=2.4.*
  - matplotlib=3.9.*
  - pandas=3.0.*
  - scipy=1.17.*
  - pytest=9.*

  # ── GPU framework ────────────────────────────────────────────────────────
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu130
    - torch==2.10.0+cu130
    - torchvision==0.25.0+cu130
    - torchaudio==2.10.0+cu130
    - nvidia-cutlass-dsl[cu13]==4.4.1
