# Slot: cuda121-torch  [stable]
# CUDA 12.1 + PyTorch 2.2.1
#
# Triton 2.2.1 is installed automatically as a pip dependency of torch.
# Verify wheel availability: https://download.pytorch.org/whl/cu121/

name: playground

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # ── Scientific stack ─────────────────────────────────────────────────────
  - jupyterlab=4.2.*
  - ipywidgets=8.*
  - numpy=1.26.*
  - matplotlib=3.9.*
  - pandas=2.2.*
  - scipy=1.13.*

  # ── GPU framework ────────────────────────────────────────────────────────
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu121
    - torch==2.2.1+cu121
    - torchvision==0.17.1+cu121
    - torchaudio==2.2.1+cu121
