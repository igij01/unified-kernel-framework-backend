# Slot: cuda126-torch
# CUDA 12.6 + PyTorch 2.6.0
#
# Triton 3.2.0 is installed automatically as a pip dependency of torch.
# Verify wheel availability: https://download.pytorch.org/whl/cu126/

name: playground

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - pip

  # ── Scientific stack ─────────────────────────────────────────────────────
  - jupyterlab=4.2.*
  - ipywidgets=8.*
  - numpy=2.1.*
  - matplotlib=3.9.*
  - pandas=2.2.*
  - scipy=1.13.*

  # ── GPU framework ────────────────────────────────────────────────────────
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu126
    - torch==2.6.0+cu126
    - torchvision==0.21.0+cu126
    - torchaudio==2.6.0+cu126
