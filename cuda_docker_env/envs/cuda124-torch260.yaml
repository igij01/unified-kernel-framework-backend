# Slot: cuda124-torch  [recommended]
# CUDA 12.4 + PyTorch 2.6.0
#
# Triton 3.2.0 is installed automatically as a pip dependency of torch.
# Verify wheel availability: https://download.pytorch.org/whl/cu124/

name: playground

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # ── Scientific stack ─────────────────────────────────────────────────────
  - jupyterlab=4.2.*
  - ipywidgets=8.*
  - numpy=2.1.*
  - matplotlib=3.9.*
  - pandas=2.2.*
  - scipy=1.13.*

  # ── GPU framework ────────────────────────────────────────────────────────
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu124
    - torch==2.6.0+cu124
    - torchvision==0.21.0+cu124
    - torchaudio==2.6.0+cu124
